<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON TETRIS // V.4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="menu">
            <h1 class="glitch" data-text="NEON TETRIS">NEON TETRIS</h1>
            <button id="start-btn">BOOT SYSTEM</button>
            <div class="high-score-board">
                <label>TOP OPERATORS</label>
                <div id="high-scores-list"></div>
            </div>
        </div>
        
        <div id="level-screen" class="hidden">
            <h2 class="glitch" data-text="SELECT START LEVEL">SELECT START LEVEL</h2>
            <div id="level-grid"></div>
        </div>
    </div>

    <div class="game-wrapper">
        <header>
            <div class="status-bar">SYSTEM STATUS: <span id="status-text" class="blink">ONLINE</span></div>
        </header>

        <div class="game-container">
            <div class="side-panel left">
                <div class="panel-box">
                    <label>SCORE</label>
                    <div id="score">000000</div>
                </div>
                <div class="panel-box" style="margin-top: 20px;">
                    <label>LEVEL</label>
                    <div id="level-display">00</div>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="tetris" width="240" height="400"></canvas>
            </div>

            <div class="side-panel right">
                <div class="panel-box">
                    <label>NEXT PROTOCOL</label>
                    <div class="next-piece-container">
                        <canvas id="next-piece" width="80" height="80"></canvas>
                    </div>
                </div>

                <div class="panel-box controls" style="margin-top: 20px;">
                    <label>COMMANDS</label>
                    <div class="control-row"><span>MOVE</span> <b>← →</b></div>
                    <div class="control-row"><span>H-DROP</span> <b>SPACE</b></div>
                    <div class="control-row"><span>DROP</span> <b>↓</b></div>
                    <div class="control-row"><span>ROT L</span> <b>Q</b></div>
                    <div class="control-row"><span>ROT R</span> <b>E / ↑</b></div>
                </div>
            </div>
        </div>
    </div>

    <div class="floating-controls">
        <button id="pause-trigger" class="circle-btn">Ⅱ</button>
        <button id="settings-trigger" class="circle-btn">⚙️</button>
    </div>

    <div id="pause-modal" class="modal-hidden modal-overlay">
        <div class="settings-content panel-box">
            <h2 class="neon-text-blue">SYSTEM PAUSED</h2>
            <button id="resume-btn" class="mini-btn wide">RESUME</button>
            <button id="restart-btn" class="mini-btn wide">RESTART</button>
            <button id="quit-btn" class="mini-btn wide">QUIT TO MENU</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal-hidden modal-overlay">
        <div class="settings-content panel-box" style="border-color: var(--neon-pink) !important;">
            <h2 class="glitch" data-text="GAME OVER" style="font-size: 2rem;">GAME OVER</h2>
            <div id="final-score" style="font-size: 2rem; margin: 20px 0;">000000</div>
            <button id="retry-btn" class="mini-btn wide">REINITIALIZE</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-hidden modal-overlay">
        <div class="settings-content panel-box">
            <h2 class="neon-text-blue">CONFIG_SYS</h2>
            <div class="setting-row"><label>VOLUME</label><input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5"></div>
            <div class="setting-row"><label>MUSIC</label><button id="music-toggle" class="mini-btn">MUTE</button></div>
            <div class="setting-row"><label>TRACK</label><select id="track-select"><option value="cyberpunk">CYBERPUNK</option><option value="classic">CLASSIC</option></select></div>
            <button id="save-settings" class="mini-btn wide">RETURN</button>
        </div>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="clear-sound" src="https://actions.google.com/sounds/v1/science_fiction/low_frequecy_hum.ogg"></audio>

    <script src="tetrominoes.js"></script>
    <script src="settings.js"></script>
    <script src="game.js"></script>
</body>
</html>
